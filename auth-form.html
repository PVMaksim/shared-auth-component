<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth Form Component</title>
  <style>
    :host {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 2rem;
      background: #1a1a2e;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      color: #fff;
    }
    .container { display: flex; flex-direction: column; gap: 1.5rem; }
    h2 { margin: 0; text-align: center; color: #6c63ff; font-size: 1.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; font-weight: 500; color: #a0a0a0; }
    input {
      padding: 0.75rem;
      border: 2px solid #2a2a3e;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #6c63ff;
    }
    button {
      padding: 0.875rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6c63ff 0%, #4834d4 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(108, 99, 255, 0.4);
    }
    button:active { transform: translateY(0); }
    button.secondary {
      background: transparent;
      border: 2px solid #6c63ff;
      color: #6c63ff;
    }
    .tabs { display: flex; gap: 1rem; border-bottom: 2px solid #2a2a3e; }
    .tab {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      color: #a0a0a0;
    }
    .tab:hover { color: #fff; }
    .tab.active {
      border-bottom-color: #6c63ff;
      color: #6c63ff;
      font-weight: 600;
    }
    .form { display: none; flex-direction: column; gap: 1rem; }
    .form.active { display: flex; }
    .message {
      padding: 0.75rem;
      border-radius: 8px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.show { display: block; }
    .message.error { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; }
    .message.success { background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #2ecc71; }
    .link {
      text-align: center;
      color: #6c63ff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .link:hover { text-decoration: underline; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 VideoGrab Auth</h2>
    
    <div id="message" class="message"></div>
    
    <div class="tabs">
      <div class="tab active" data-tab="login">Вход</div>
      <div class="tab" data-tab="register">Регистрация</div>
    </div>

    <!-- Login Form -->
    <form class="form active" id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Пароль</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" />
      </div>
      <button type="submit">Войти</button>
      <div class="link" id="forgotPassword">Забыли пароль?</div>
    </form>

    <!-- Register Form -->
    <form class="form" id="registerForm">
      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="registerPassword">Пароль (мин. 6 символов)</label>
        <input type="password" id="registerPassword" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit">Создать аккаунт</button>
    </form>
  </div>

  <script>
    class AuthForm extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.backendUrl = this.getAttribute('backend-url') || 'http://localhost:8000';
      }

      connectedCallback() {
        this.shadowRoot.innerHTML = document.querySelector('template').innerHTML;
        this.init();
      }

      init() {
        // Tabs
        this.shadowRoot.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', (e) => this.switchTab(e.target.dataset.tab));
        });

        // Forms
        this.shadowRoot.getElementById('loginForm').addEventListener('submit', (e) => this.handleLogin(e));
        this.shadowRoot.getElementById('registerForm').addEventListener('submit', (e) => this.handleRegister(e));
        this.shadowRoot.getElementById('forgotPassword').addEventListener('click', () => this.handleForgotPassword());
      }

      switchTab(tab) {
        this.shadowRoot.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.shadowRoot.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
        
        this.shadowRoot.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        this.shadowRoot.getElementById(`${tab}Form`).classList.add('active');
        this.hideMessage();
      }

      async handleLogin(e) {
        e.preventDefault();
        const email = this.shadowRoot.getElementById('loginEmail').value;
        const password = this.shadowRoot.getElementById('loginPassword').value;

        try {
          const res = await fetch(`${this.backendUrl}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ username: email, password })
          });
          
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail);
          
          localStorage.setItem('token', data.access_token);
          this.showMessage('✅ Вход выполнен!', 'success');
          this.dispatchEvent(new CustomEvent('auth:login', { detail: { token: data.access_token } }));
        } catch (err) {
          this.showMessage('❌ ' + err.message, 'error');
        }
      }

      async handleRegister(e) {
        e.preventDefault();
        const email = this.shadowRoot.getElementById('registerEmail').value;
        const password = this.shadowRoot.getElementById('registerPassword').value;

        try {
          const res = await fetch(`${this.backendUrl}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          
          const data = await res.json();
          if (!res.ok) {
            if (res.status === 409) {
              this.showMessage('⚠️ Email уже зарегистрирован. <a href="#" id="resetLink">Сбросить пароль?</a>', 'error', true);
              this.shadowRoot.getElementById('resetLink')?.addEventListener('click', () => this.handleForgotPassword());
            } else {
              this.showMessage('❌ ' + data.detail, 'error');
            }
            return;
          }
          
          this.showMessage('✅ Аккаунт создан! Теперь войдите.', 'success');
          setTimeout(() => this.switchTab('login'), 1500);
          this.dispatchEvent(new CustomEvent('auth:register', { detail: data }));
        } catch (err) {
          this.showMessage('❌ ' + err.message, 'error');
        }
      }

      handleForgotPassword() {
        const email = this.shadowRoot.getElementById('loginEmail').value || 
                      this.shadowRoot.getElementById('registerEmail').value;
        if (!email) {
          this.showMessage('⚠️ Введите email для сброса пароля', 'error');
          return;
        }
        this.showMessage('📧 Ссылка для сброса пароля отправлена на ' + email, 'success');
        // Здесь можно добавить реальный вызов API для сброса пароля
      }

      showMessage(text, type, allowHTML = false) {
        const msg = this.shadowRoot.getElementById('message');
        if (allowHTML) {
          msg.innerHTML = text;
        } else {
          msg.textContent = text;
        }
        msg.className = `message show ${type}`;
        setTimeout(() => this.hideMessage(), 5000);
      }

      hideMessage() {
        const msg = this.shadowRoot.getElementById('message');
        msg.classList.remove('show');
      }
    }

    customElements.define('auth-form', AuthForm);
  </script>
</body>
</html>
